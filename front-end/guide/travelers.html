<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TICP — Travelers</title>
<link rel="stylesheet" href="../static/shared.css">
<style>
:root { --primary: #F5A623; --primary-dark: #e09520; --gradient: linear-gradient(135deg,#F5A623 0%,#E8467C 100%); --gradient-soft: linear-gradient(135deg,#fff8ee 0%,#ffeef5 100%); }
.profile-card{background:#fff;border-radius:var(--radius-md);border:1px solid var(--border-light);overflow:hidden}
.profile-header{padding:24px;display:flex;align-items:center;gap:20px;border-bottom:1px solid var(--border-light)}
.big-avatar{width:72px;height:72px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:700;flex-shrink:0}
.tab-btns{display:flex;gap:2px;background:var(--bg-soft);padding:4px;border-radius:var(--radius-sm)}
.tab-btn{padding:8px 18px;border-radius:6px;border:none;background:none;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;color:var(--text-secondary)}
.tab-btn.active{background:#fff;color:var(--primary);font-weight:700;box-shadow:var(--shadow-sm)}
.activity-item-guide{display:flex;align-items:flex-start;gap:12px;padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border-light);margin-bottom:10px}
.activity-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.booking-row{display:flex;justify-content:space-between;align-items:center;padding:14px;border:1px solid var(--border-light);border-radius:var(--radius-sm);margin-bottom:8px}
.metric-box{text-align:center;padding:16px;background:var(--bg-soft);border-radius:var(--radius-sm)}
.metric-value{font-size:24px;font-weight:800;color:var(--primary);font-family:var(--font-main)}
.metric-label{font-size:13px;color:var(--text-muted);margin-top:2px}
.progress-activity{height:6px;background:var(--border-light);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-activity-fill{height:6px;background:var(--gradient);border-radius:3px}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon" style="background:linear-gradient(135deg,#10b981 0%,#059669 100%);color:#fff;font-size:18px">🧭</div><div><div class="logo-text">GlobeSync</div><div class="logo-sub">Guide Portal</div></div></div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="guide-dashboard.html"><span class="nav-icon">📊</span>Dashboard</a>
      <a class="nav-item active" href="travelers.html"><span class="nav-icon">👥</span>Travelers</a>
      <a class="nav-item" href="messages.html"><span class="nav-icon">💬</span>Messages</a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn" onclick="logout()"><span>🚪</span>Logout</button></div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div><div class="page-title">Travelers</div><div class="page-subtitle">Manage and track your assigned travelers</div></div>
    </div>

    <div class="grid-2" style="align-items:start">
      <!-- TRAVELER LIST -->
      <div>
        <div class="card mb-4">
          <div class="card-header"><span class="card-title">Assigned Travelers</span></div>
          <div class="card-body" id="traveler-list" style="padding:0"></div>
        </div>
      </div>

      <!-- TRAVELER PROFILE -->
      <div id="profile-panel">
        <div class="empty-state card" style="padding:48px">
          <div class="empty-icon">👤</div>
          <h3>Select a traveler</h3>
          <p>Click on a traveler to view their profile and trip details</p>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- SUGGEST ITINERARY MODAL -->
<div class="modal-overlay" id="suggest-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">✈ Suggest Itinerary Changes</div>
      <button class="modal-close" onclick="closeModal('suggest-modal')">✕</button>
    </div>
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:20px">Add details about the suggestion and estimated cost.</p>
    <form id="suggest-form" onsubmit="sendSuggestion(event)">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Day *</label>
          <select class="form-control" id="sug-day" data-required="Please select a day">
            <option value="">Select day</option>
            <option value="1">Day 1</option><option value="2">Day 2</option>
            <option value="3">Day 3</option><option value="4">Day 4</option>
            <option value="5">Day 5</option>
          </select>
          <div class="form-error" id="sug-day-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Time</label>
          <input class="form-control" type="time" id="sug-time">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Activity Type *</label>
        <select class="form-control" id="sug-type" data-required="Please select a type">
          <option value="">Select type</option>
          <option>Dining</option><option>Sightseeing</option><option>Adventure</option>
          <option>Cultural</option><option>Shopping</option><option>Transport</option>
        </select>
        <div class="form-error" id="sug-type-error"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes *</label>
        <textarea class="form-control" id="sug-notes" rows="3" placeholder="Add details about the suggestion..." data-required="Please add notes"></textarea>
        <div class="form-error" id="sug-notes-error"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Estimated Cost ($)</label>
        <input class="form-control" type="number" id="sug-cost" placeholder="0" value="0" min="0">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal('suggest-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary" style="background:linear-gradient(135deg,#10b981,#059669)">Send Suggestion</button>
      </div>
    </form>
  </div>
</div>

<div class="toast-container"></div>
<script src="../JS/mockData.js"></script>
<script src="../JS/helpers.js"></script>
<script>
if (!Auth.isLoggedIn() || Auth.getRole() !== 'guide') window.location.href = '../login.html?role=guide';
const user = Auth.getUser();
let activeTab = 'profile';

function loadTravelerList() {
  const myTrips = DB.trips.filter(t => t.guide_id === user.guide_id);
  const travelerIds = [...new Set(myTrips.map(t => t.traveler_id))];
  const travelers = travelerIds.map(id => {
    const t = DB.travelers.find(t => t.traveler_id === id);
    const trip = myTrips.find(t => t.traveler_id === id);
    return { ...t, trip };
  });
  const container = document.getElementById('traveler-list');
  if (travelers.length === 0) {
    container.innerHTML = '<div class="empty-state" style="padding:32px"><div class="empty-icon">👥</div><p>No travelers assigned</p></div>';
    return;
  }
  container.innerHTML = travelers.map(t => `
    <div onclick="showProfile(${t.traveler_id})" style="padding:16px 20px;border-bottom:1px solid var(--border-light);cursor:pointer;display:flex;align-items:center;gap:14px;transition:background 0.2s" onmouseover="this.style.background='#fff8ee'" onmouseout="this.style.background='#fff'">
      <div style="width:44px;height:44px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;flex-shrink:0">${t.name[0]}</div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:14px">${t.name}</div>
        <div style="font-size:13px;color:var(--text-muted)">${t.trip ? t.trip.destination : 'No trip'} ${t.trip ? '• ' + formatDate(t.trip.start_date) : ''}</div>
      </div>
      ${t.trip ? statusBadge(t.trip.status) : ''}
      <span style="color:var(--text-muted)">→</span>
    </div>`).join('');
}

function showProfile(travelerId) {
  const traveler = DB.travelers.find(t => t.traveler_id === travelerId);
  const trip = DB.trips.find(t => t.traveler_id === travelerId && t.guide_id === user.guide_id);
  const bookings = DB.bookings.filter(b => b.traveler_id === travelerId);
  const itins = trip ? DB.itineraries.filter(i => i.trip_id === trip.trip_id) : [];
  const completed = itins.filter(i => i.activity_status === 'Completed').length;
  const panel = document.getElementById('profile-panel');
  panel.innerHTML = `
    <div class="profile-card">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center">
        <div style="font-family:var(--font-main);font-size:18px;font-weight:700">Traveler Profile</div>
        <button onclick="openModal('suggest-modal')" class="btn btn-primary btn-sm" style="background:linear-gradient(135deg,#10b981,#059669)">✈ Suggest Itinerary</button>
      </div>

      <!-- TABS -->
      <div style="padding:12px 20px;border-bottom:1px solid var(--border-light)">
        <div class="tab-btns">
          <button class="tab-btn active" id="tab-profile" onclick="switchTab('profile')">Profile & Stats</button>
          <button class="tab-btn" id="tab-progress" onclick="switchTab('progress')">Trip Progress</button>
        </div>
      </div>

      <!-- PROFILE TAB -->
      <div id="tab-content-profile" style="padding:20px">
        <div style="text-align:center;margin-bottom:20px">
          <div style="width:72px;height:72px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:700;margin:0 auto 12px">${traveler.name[0]}</div>
          <div style="font-family:var(--font-main);font-size:18px;font-weight:700">${traveler.name}</div>
          <span class="badge badge-success" style="margin-top:4px">Active Traveler</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">
          <div style="display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text-secondary)">📧 <span>${traveler.email}</span></div>
          <div style="display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text-secondary)">📞 <span>${traveler.phone || 'N/A'}</span></div>
        </div>
        <button class="btn btn-secondary" style="width:100%;margin-bottom:20px">Contact Traveler</button>

        ${trip ? `
        <div style="background:var(--bg-soft);border-radius:var(--radius-sm);padding:16px;margin-bottom:20px">
          <div style="font-weight:700;font-size:14px;margin-bottom:12px">Current Trip</div>
          <div style="font-size:15px;font-weight:700;margin-bottom:4px">📍 ${trip.destination}</div>
          <div style="font-size:13px;color:var(--text-muted);margin-bottom:4px">📅 ${formatDate(trip.start_date)} - ${formatDate(trip.end_date)}</div>
          ${statusBadge(trip.status)}
        </div>` : ''}

        <div style="font-weight:700;font-size:14px;margin-bottom:12px">Performance Metrics</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
          <div class="metric-box"><div class="metric-value">4.8</div><div class="metric-label">Trip Rating</div></div>
          <div class="metric-box"><div class="metric-value">8</div><div class="metric-label">Total Trips</div></div>
          <div class="metric-box"><div class="metric-value">5</div><div class="metric-label">Countries</div></div>
        </div>

        <div style="font-weight:700;font-size:14px;margin-bottom:12px">Booking Portfolio</div>
        ${bookings.length === 0 ? '<div class="empty-state" style="padding:16px"><p>No bookings</p></div>' :
          bookings.slice(0,3).map(b => `
          <div class="booking-row">
            <div><div style="font-weight:600;font-size:14px">${b.service}</div>${statusBadge(b.status)}</div>
            <div style="font-weight:700;color:var(--primary)">${formatCurrency(b.amount)}</div>
          </div>`).join('')}
      </div>

      <!-- PROGRESS TAB -->
      <div id="tab-content-progress" style="padding:20px;display:none">
        ${trip ? `
        <div style="margin-bottom:20px">
          <div style="font-weight:700;font-size:15px;margin-bottom:8px">Trip Progress</div>
          <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-muted);margin-bottom:6px"><span>Overall Completion</span><span>${completed} of ${itins.length} activities</span></div>
          <div class="progress-activity"><div class="progress-activity-fill" style="width:${itins.length > 0 ? Math.round(completed/itins.length*100) : 0}%"></div></div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px">
          <div class="metric-box"><div class="metric-value" style="font-size:20px">${itins.filter(i=>i.activity_status==='Pending').length}</div><div class="metric-label">Pending</div></div>
          <div class="metric-box"><div class="metric-value" style="font-size:20px;color:#3b82f6">1</div><div class="metric-label">In Progress</div></div>
          <div class="metric-box"><div class="metric-value" style="font-size:20px;color:#10b981">${completed}</div><div class="metric-label">Completed</div></div>
          <div class="metric-box"><div class="metric-value" style="font-size:20px;color:#6b7280">0</div><div class="metric-label">Skipped</div></div>
        </div>
        <div style="font-weight:700;font-size:14px;margin-bottom:12px">Daily Activities</div>
        ${[...new Set(itins.map(i=>i.day_number))].sort().map(day => {
          const dayActs = itins.filter(i=>i.day_number===day);
          const doneCount = dayActs.filter(i=>i.activity_status==='Completed').length;
          return `<div style="margin-bottom:16px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <div style="font-weight:700;font-size:14px">Day ${day}</div>
              <div style="font-size:12px;color:var(--text-muted)">${doneCount}/${dayActs.length} completed</div>
            </div>
            ${dayActs.map(a=>`
            <div style="display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border-light);border-radius:var(--radius-sm);margin-bottom:8px">
              <span style="font-size:18px">${a.activity_status==='Completed'?'✅':'⏳'}</span>
              <div style="flex:1">
                <div style="font-weight:600;font-size:14px">${a.activity}</div>
                ${a.city?`<div style="font-size:12px;color:var(--text-muted)">📍 ${a.city}</div>`:''}
              </div>
              ${statusBadge(a.activity_status)}
              <button onclick="updateActivity(${a.itinerary_id},'${travelerId}')" class="btn btn-secondary btn-sm">Update</button>
            </div>`).join('')}
          </div>`;
        }).join('')}` : '<div class="empty-state"><div class="empty-icon">📋</div><p>No active trip</p></div>'}
      </div>
    </div>`;
  setupLiveValidation('suggest-form');
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-btn-profile') && null;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById('tab-content-profile').style.display = tab === 'profile' ? 'block' : 'none';
  document.getElementById('tab-content-progress').style.display = tab === 'progress' ? 'block' : 'none';
}

function updateActivity(id, travelerId) {
  const statuses = ['Pending', 'Confirmed', 'Completed'];
  const act = DB.itineraries.find(i => i.itinerary_id === id);
  const nextIdx = (statuses.indexOf(act.activity_status) + 1) % statuses.length;
  act.activity_status = statuses[nextIdx];
  showToast(`Activity marked as ${act.activity_status}`);
  showProfile(parseInt(travelerId));
}

function sendSuggestion(e) {
  e.preventDefault();
  if (!validateForm('suggest-form')) return;
  closeModal('suggest-modal');
  document.getElementById('suggest-form').reset();
  showToast('Suggestion sent to traveler! ✓');
}

loadTravelerList();
setupLiveValidation('suggest-form');
</script>
</body>
</html>
