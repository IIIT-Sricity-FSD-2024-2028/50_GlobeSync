<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TICP Support — Messages</title>
<link rel="stylesheet" href="../static/shared.css">
<style>
:root{--primary:#10b981;--primary-dark:#059669;--gradient:linear-gradient(135deg,#10b981 0%,#3b82f6 100%);--gradient-soft:linear-gradient(135deg,#ecfdf5 0%,#eff6ff 100%)}
.main-content { overflow: hidden !important; height: 100vh; display: flex; flex-direction: column; }
.messages-layout{display:flex;flex:1;min-height:0;background:#fff;border-radius:12px;border:1px solid var(--border-light);overflow:hidden;box-shadow:0 10px 25px -5px rgba(0,0,0,0.05)}
.conv-list{width:300px;border-right:1px solid var(--border-light);overflow-y:auto;background:#fff;display:flex;flex-direction:column;flex-shrink:0}
.conv-list-header{padding:16px 20px;border-bottom:1px solid var(--border-light);font-size:15px;font-weight:700;color:var(--text-primary);background:#fafafa}
.conv-item{padding:14px 16px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background 0.2s;display:flex;align-items:flex-start;gap:12px}
.conv-item:hover,.conv-item.active{background:var(--gradient-soft)}
.conv-item.active{border-left:4px solid var(--primary);padding-left:12px}
.conv-avatar{width:44px;height:44px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;flex-shrink:0}
.conv-name{font-weight:700;font-size:14px;margin-bottom:2px}
.conv-role{font-size:12px;color:var(--primary);font-weight:600}
.conv-preview{font-size:13px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.conv-time{font-size:11px;color:var(--text-muted);white-space:nowrap}

.chat-area{display:flex;flex-direction:column;flex:1;min-width:0;height:100%;overflow:hidden}
.chat-header{padding:16px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:12px;background:#fafafa;height:70px;flex-shrink:0}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--success)}

.messages-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:12px;background:#f8fafc;min-height:0}
.msg{display:flex;flex-direction:column;max-width:70%}
.msg.sent{align-self:flex-end;align-items:flex-end}
.msg.received{align-self:flex-start}
.msg-bubble{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.5}
.msg.sent .msg-bubble{background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.msg.received .msg-bubble{background:#fff;color:var(--text-primary);border-bottom-left-radius:4px;border:1px solid var(--border-light)}
.msg-time{font-size:11px;color:var(--text-muted);margin-top:4px;padding:0 4px}

.chat-input-area{padding:16px 20px;border-top:1px solid var(--border-light);display:flex;align-items:center;gap:12px;background:#fff;flex-shrink:0}
.chat-input{flex:1;padding:12px 16px;border:1.5px solid var(--border);border-radius:24px;font-size:14px;outline:none;font-family:var(--font-body)}
.chat-input:focus{border-color:var(--primary)}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--gradient);border:none;cursor:pointer;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center}

.empty-chat{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);background:#f8fafc}
.empty-icon{font-size:56px;margin-bottom:16px}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon" style="background:linear-gradient(135deg,#6366f1 0%,#a855f7 100%);color:#fff;font-size:18px">🌐</div><div><div class="logo-text" style="background:linear-gradient(135deg,#6366f1 0%,#a855f7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">GlobeSync</div><div class="logo-sub">Support Portal</div></div></div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="support-dashboard.html"><span class="nav-icon">📊</span>Dashboard</a>
      <a class="nav-item" href="tickets.html"><span class="nav-icon">🎫</span>Tickets</a>
      <a class="nav-item" href="refunds.html"><span class="nav-icon">💰</span>Refunds</a>
      <a class="nav-item active" href="messages.html"><span class="nav-icon">💬</span>Messages</a>
      <a class="nav-item" data-page="profile" href="profile.html"><span class="nav-icon">🔴</span>My Profile</a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn" onclick="logout()"><span>🚪</span>Logout</button></div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div><div class="page-title">Direct Messaging</div><div class="page-subtitle">Unified traveler support ecosystem</div></div>
    </div>

    <div class="messages-layout" style="flex:1; min-height:0">
      <!-- CONVERSATION LIST -->
      <div class="conv-list">
        <div class="conv-list-header">💬 Direct Chats</div>
        <div id="conv-list"></div>
      </div>

      <!-- CHAT AREA -->
      <div class="chat-area" id="chat-area">
        <div class="empty-chat">
          <div class="empty-icon">💬</div>
          <h3>Select a Conversation</h3>
          <p>Choose a traveler to start providing support</p>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../JS/mockData.js"></script>
<script src="../JS/helpers.js"></script>
<script src="../JS/notifications.js"></script>
<script src="../JS/api.js"></script>
<script>
if (!Auth.isLoggedIn() || Auth.getRole() !== 'support') window.location.href = '../login.html?role=support';
const user = Auth.getUser();
let activeTravelerId = null;
let _travelers = [], _allMessages = [];

async function loadData() {
  try {
    [_travelers, _allMessages] = await Promise.all([
      apiGetSnake('/travelers'),
      apiGetSnake('/messages')
    ]);
    renderConvList();
    if (activeTravelerId) selectConversation(activeTravelerId);
  } catch (e) { console.error('Failed to load messages:', e); }
}

function renderConvList() {
  const container = document.getElementById('conv-list');
  container.innerHTML = _travelers.map(t => {
    const lastMsg = [..._allMessages].reverse().find(m => (m.sender_id === t.traveler_id && m.sender === 'traveler') || (m.receiver_id === t.traveler_id && m.receiver === 'traveler'));
    return `
      <div class="conv-item ${activeTravelerId === t.traveler_id ? 'active' : ''}" onclick="selectConversation(${t.traveler_id})">
        <div class="conv-avatar">${t.name[0]}</div>
        <div style="flex:1;min-width:0">
          <div class="flex-between"><span class="conv-name">${t.name}</span><span class="conv-time">Just now</span></div>
          <div class="conv-role">Traveler</div>
          <div class="conv-preview">${lastMsg ? lastMsg.content : 'No messages yet'}</div>
        </div>
      </div>`;
  }).join('');
}

function selectConversation(id) {
  activeTravelerId = id;
  const traveler = _travelers.find(t => t.traveler_id === id);
  if (!traveler) return;
  renderConvList();

  document.getElementById('chat-area').innerHTML = `
    <div class="chat-header">
      <div class="conv-avatar" style="width:40px;height:40px;font-size:16px">${traveler.name[0]}</div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:15px">${traveler.name}</div>
        <div style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted)">
          <div class="online-dot"></div> Online
        </div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="location.href='tickets.html'">View Tickets</button>
    </div>
    <div class="messages-area" id="messages-area"></div>
    <form class="chat-input-area" onsubmit="sendMessage(event)">
      <span style="font-size:20px;cursor:pointer;color:var(--text-muted)">📎</span>
      <input type="text" class="chat-input" id="message-input" placeholder="Type your response here...">
      <button type="submit" class="send-btn">➤</button>
    </form>`;

  loadMessages();
}

function loadMessages() {
  const container = document.getElementById('messages-area');
  const msgs = _allMessages.filter(m =>
    (m.receiver === 'traveler' && m.receiver_id === activeTravelerId) ||
    (m.sender === 'traveler' && m.sender_id === activeTravelerId)
  );
  container.innerHTML = msgs.map(m => `
    <div class="msg ${m.sender === 'support' ? 'sent' : 'received'}">
      <div class="msg-bubble">${m.content}</div>
      <div class="msg-time">${new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
    </div>
  `).join('');
  container.scrollTop = container.scrollHeight;
}

async function sendMessage(e) {
  e.preventDefault();
  const input = document.getElementById('message-input');
  const content = input.value.trim();
  if (!content || !activeTravelerId) return;
  try {
    await apiPost('/messages', {
      sender: 'support',
      senderId: user.care_id,
      receiver: 'traveler',
      receiverId: activeTravelerId,
      content: content
    });
    input.value = '';
    await loadData();
  } catch (e) { console.error('Failed to send message:', e); }
}

// Check for URL parameter
const urlParams = new URLSearchParams(window.location.search);
const tId = urlParams.get('travelerId');
if (tId) {
  activeTravelerId = parseInt(tId);
}
loadData();

</script>
</body>
</html>
