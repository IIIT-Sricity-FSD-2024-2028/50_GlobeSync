<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TICP — User Management</title>
<link rel="stylesheet" href="../static/shared.css">
<style>
:root{--primary:#E8467C;--gradient:linear-gradient(135deg,#E8467C 0%,#F5A623 100%);--gradient-soft:linear-gradient(135deg,#ffeef5 0%,#fff8ee 100%)}
.nav-item.active{background:#fdf2f8;color:var(--primary);font-weight:600;border-left:4px solid var(--primary)}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon" style="background:var(--gradient);color:#fff;font-size:18px">🌐</div><div><div class="logo-text">GlobeSync</div><div class="logo-sub">Super User</div></div></div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="super-dashboard.html"><span class="nav-icon">📊</span>Dashboard</a>
      <a class="nav-item active" href="users.html"><span class="nav-icon">👥</span>Users</a>
      <a class="nav-item" href="api-management.html"><span class="nav-icon">🔌</span>API Management</a>
      <a class="nav-item" href="rules-config.html"><span class="nav-icon">⚙</span>Rules Config</a>
      <a class="nav-item" href="reports.html"><span class="nav-icon">📈</span>Reports</a>
    </nav>
    <div class="sidebar-footer">
      <div style="padding:10px 12px;font-size:12px;color:var(--text-muted);margin-bottom:4px">Logged in as Super User</div>
      <button class="logout-btn" onclick="logout()"><span>🚪</span>Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div><div class="page-title">User Management</div><div class="page-subtitle">Manage all platform users with full CRUD access</div></div>
      <div class="topbar-actions">
        <div class="search-bar"><span class="search-icon">🔍</span><input type="text" id="user-search" placeholder="Search users..."></div>
        <select id="role-filter" class="form-control" style="width:auto;padding:8px 14px" onchange="renderUsers()">
          <option value="">All Roles</option>
          <option value="Traveler">Traveler</option>
          <option value="Guide">Guide</option>
          <option value="Support">Support</option>
          <option value="Admin">Admin</option>
        </select>
        <select id="status-filter" class="form-control" style="width:auto;padding:8px 14px" onchange="renderUsers()">
          <option value="">All Status</option>
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
        <button class="btn btn-primary" style="background:var(--teal);border:none;box-shadow:0 4px 12px rgba(25,182,166,0.2)" onclick="openAddUser()">+ Add New User</button>
      </div>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>User ID</th><th>Name</th><th>Role</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
      <div id="empty-users" class="empty-state" style="display:none"><div class="empty-icon">👥</div><h3>No users found</h3></div>
    </div>
  </main>
</div>

<!-- ADD/EDIT USER MODAL -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="user-modal-title">Add New User</div>
      <button class="modal-close" onclick="closeModal('user-modal')">✕</button>
    </div>
    <form id="user-form" onsubmit="saveUser(event)">
      <input type="hidden" id="edit-user-id">
      <input type="hidden" id="edit-user-role-type">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input class="form-control" id="u-name" placeholder="John Doe" data-required="Name is required">
          <div class="form-error" id="u-name-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Role *</label>
          <select class="form-control" id="u-role" data-required="Please select a role" onchange="toggleRoleFields()">
            <option value="">Select role</option>
            <option value="Admin">Administrator</option>
            <option value="Support">Customer Support</option>
            <option value="Traveler">Traveler</option>
            <option value="Guide">Guide</option>
          </select>
          <div class="form-error" id="u-role-error"></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input class="form-control" type="email" id="u-email" placeholder="user@example.com" data-required="Valid email is required">
        <div class="form-error" id="u-email-error"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-control" id="u-phone" placeholder="+91 98765 43210">
      </div>
      <!-- Admin fields -->
      <div id="admin-fields" style="display:none">
        <div class="form-group">
          <label class="form-label">Regional Office / Region</label>
          <input class="form-control" id="u-region" placeholder="e.g. North America, HQ, Mumbai">
        </div>
      </div>
      <!-- Traveler fields -->
      <div id="traveler-fields" style="display:none">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Gender</label>
            <select class="form-control" id="u-gender"><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select>
          </div>
          <div class="form-group">
            <label class="form-label">Age</label>
            <input class="form-control" type="number" id="u-age" placeholder="25" min="1" max="120">
          </div>
        </div>
      </div>
      <!-- Guide fields -->
      <div id="guide-fields" style="display:none">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Language</label>
            <input class="form-control" id="u-language" placeholder="e.g., English, French">
          </div>
          <div class="form-group">
            <label class="form-label">Experience (years)</label>
            <input class="form-control" type="number" id="u-experience" placeholder="5" min="0">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password *</label>
        <input class="form-control" type="password" id="u-password" placeholder="Min. 8 characters" data-required="Password is required" data-minlen="8">
        <div class="form-error" id="u-password-error"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password *</label>
        <input class="form-control" type="password" id="u-confirm" placeholder="Re-enter password" data-required="Please confirm password" data-match="u-password">
        <div class="form-error" id="u-confirm-error"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-control" id="u-status"><option value="Active">Active</option><option value="Inactive">Inactive</option></select>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal('user-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary" style="background:var(--gradient)">Save User</button>
      </div>
    </form>
  </div>
</div>

<!-- VIEW USER MODAL -->
<div class="modal-overlay" id="view-user-modal">
  <div class="modal"><div class="modal-header"><div class="modal-title">User Details</div><button class="modal-close" onclick="closeModal('view-user-modal')">✕</button></div><div id="view-user-content"></div></div>
</div>

<div class="toast-container"></div>
<script src="../JS/mockData.js"></script>
<script src="../JS/helpers.js"></script>
<script src="../JS/notifications.js"></script>
<script src="../JS/super-users.js"></script>
</body>
</html>
